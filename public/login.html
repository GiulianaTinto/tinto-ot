<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinto Labels – Ingresar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo .marca { font-size: 28px; font-weight: 900; letter-spacing: 4px; color: #1a1a2e; }
  .logo .sub { font-size: 12px; color: #888; letter-spacing: 2px; margin-top: 2px; }
  .logo .linea { width: 40px; height: 3px; background: #c0392b; margin: 10px auto 0; border-radius: 2px; }
  h2 { font-size: 16px; color: #444; margin-bottom: 24px; text-align: center; font-weight: 400; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; margin-bottom: 6px; }
  input {
    width: 100%; padding: 11px 14px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; font-family: Arial, sans-serif;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }
  .btn {
    width: 100%; padding: 12px;
    background: #c0392b; color: white;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: background 0.2s;
  }
  .btn:hover { background: #a93226; }
  .error {
    background: #fef2f2; color: #c0392b;
    border: 1px solid #fca5a5;
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-top: 14px;
    display: none;
  }
  .error.visible { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="marca">TINTO</div>
    <div class="sub">LABELS · MENDOZA</div>
    <div class="linea"></div>
  </div>
  <h2>Ingresá con tu cuenta</h2>
  <form onsubmit="login(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" required autofocus>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="btn-login">Ingresar</button>
    <div class="error" id="error-msg"></div>
  </form>
</div>
<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('error-msg');
  btn.textContent = 'Ingresando...';
  btn.disabled = true;
  errEl.classList.remove('visible');
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = data.error || 'Error al ingresar';
      errEl.classList.add('visible');
    }
  } catch(err) {
    errEl.textContent = 'Error de conexión: ' + err.message;
    errEl.classList.add('visible');
  }
  btn.textContent = 'Ingresar';
  btn.disabled = false;
}
</script>
</body>
</html>
