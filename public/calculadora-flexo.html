<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinto Labels – Calculadora Flexo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #faf6ef; color: #2a2218; min-height: 100vh; }

  header {
    background: #1a1208; padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid #c9a96e;
  }
  .header-left .sub { font-size: 11px; color: #c9a96e; letter-spacing: 0.15em; text-transform: uppercase; font-family: Arial, sans-serif; margin-bottom: 4px; }
  .header-left .titulo { font-size: 20px; font-weight: 700; color: #f5f0e8; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .btn-back { color: #c9a96e; text-decoration: none; font-size: 13px; font-family: Arial, sans-serif; }
  .btn-back:hover { color: #f5f0e8; }
  .user-label { font-size: 12px; color: #8a7060; font-family: Arial, sans-serif; }

  .main { max-width: 860px; margin: 0 auto; padding: 28px 24px; }

  .card {
    background: #fffdf9; border: 1px solid #e0d5c5;
    border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
  }
  .card-dark { background: #1a1208; border: none; }
  .card-title {
    font-size: 13px; font-weight: 600; color: #8a7a6a;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 16px; font-family: Arial, sans-serif;
  }
  .card-dark .card-title { color: #c9a96e; letter-spacing: 0.1em; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }

  .campo { display: flex; flex-direction: column; gap: 4px; }
  .campo label { font-size: 11px; font-weight: 500; color: #8a7a6a; text-transform: uppercase; letter-spacing: 0.06em; font-family: Arial, sans-serif; }
  .campo .hint { font-size: 11px; color: #b0a090; font-family: Arial, sans-serif; }
  .campo input {
    background: #fffdf9; border: 1px solid #e0d5c5; border-radius: 6px;
    padding: 8px 10px; font-size: 14px; color: #2a2218;
    outline: none; width: 100%; font-family: Georgia, serif;
  }
  .campo input:focus { border-color: #c9a96e; box-shadow: 0 0 0 2px rgba(201,169,110,0.15); }

  .section-label {
    font-size: 11px; font-weight: 600; color: #c9a96e; text-transform: uppercase;
    letter-spacing: 0.1em; font-family: Arial, sans-serif;
    margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #e0d5c5;
  }
  .section-label:first-child { margin-top: 0; }

  .metrics { display: flex; flex-wrap: wrap; gap: 10px; }
  .metric {
    background: #fffdf9; border: 1px solid #e0d5c5;
    border-radius: 10px; padding: 14px 16px; text-align: center;
    flex: 1; min-width: 110px;
  }
  .metric.accent { background: #0f0b05; border: none; }
  .metric-label { font-size: 11px; color: #8a7a6a; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-bottom: 6px; font-family: Arial, sans-serif; }
  .metric.accent .metric-label { color: #c9a96e; }
  .metric-value { font-size: 22px; font-weight: 700; color: #2a2218; line-height: 1.1; }
  .metric.accent .metric-value { color: #f0c97a; font-size: 28px; }
  .metric-unit { font-size: 11px; color: #b0a090; margin-top: 3px; font-family: Arial, sans-serif; }
  .metric.accent .metric-unit { color: #8a7a50; }

  .desglose-fila {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 1px solid #f0e8d8; font-size: 13px;
    font-family: Arial, sans-serif;
  }
  .desglose-fila:last-child { border-bottom: none; }
  .desglose-fila .lbl { color: #6a5a4a; }
  .desglose-fila .val { color: #4a3a2a; font-variant-numeric: tabular-nums; }
  .desglose-fila.negrita .lbl, .desglose-fila.negrita .val { font-weight: 600; color: #2a2218; }

  .formula {
    background: #f5f0e4; border: 1px solid #d0c0a0; border-radius: 10px;
    padding: 14px 18px; font-size: 12px; color: #6a5a3a;
    font-family: monospace; line-height: 2;
  }
  .formula-titulo { font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; color: #4a3a1a; display: block; margin-bottom: 4px; }

  #resultados { display: none; }
  #resultados.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="sub">Tinto Labels — Mendoza</div>
    <div class="titulo">Calculadora metros OT Flexo</div>
  </div>
  <div class="header-right">
    <a href="/calculadora.html" class="btn-back">← Calculadoras</a>
    <span class="user-label" id="user-label"></span>
  </div>
</header>

<div class="main">

  <!-- Datos de la etiqueta -->
  <div class="card">
    <div class="card-title">Datos de la etiqueta</div>
    <div class="grid">
      <div class="campo">
        <label>Cantidad de etiquetas</label>
        <input type="number" id="qty" min="1" step="1" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Ancho etiqueta (mm)</label>
        <span class="hint">dirección de avance</span>
        <input type="number" id="ancho_etiq" min="1" step="0.1" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Alto etiqueta (mm)</label>
        <input type="number" id="alto_etiq" min="1" step="0.1" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Gap avance (mm)</label>
        <input type="number" id="gap_avance" min="0" step="0.1" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Gap alto (mm)</label>
        <span class="hint">entre filas</span>
        <input type="number" id="gap_alto" min="0" step="0.1" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Gap extremos (mm)</label>
        <span class="hint">cada lado del sustrato</span>
        <input type="number" id="gap_extremos" min="0" step="0.1" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Filas</label>
        <input type="number" id="filas" min="1" step="1" oninput="recalcular()">
      </div>
    </div>

    <div class="section-label">Scrap de arranque</div>
    <div class="grid">
      <div class="campo">
        <label>Setup (m)</label>
        <span class="hint">metros de arranque</span>
        <input type="number" id="setup" min="0" step="0.5" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Pie (m)</label>
        <span class="hint">metros de cierre</span>
        <input type="number" id="pie" min="0" step="0.5" oninput="recalcular()">
      </div>
    </div>

    <div class="section-label">Bobinas</div>
    <div class="grid">
      <div class="campo">
        <label>Metros por bobina de sustrato</label>
        <input type="number" id="bob_sust" value="1800" min="1" step="50" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Metros de folia usados</label>
        <span class="hint">0 si no aplica</span>
        <input type="number" id="metros_folia" min="0" step="1" oninput="recalcular()">
      </div>
      <div class="campo">
        <label>Metros por bobina de folia</label>
        <span class="hint">0 si no aplica</span>
        <input type="number" id="bob_folia" min="0" step="50" oninput="recalcular()">
      </div>
    </div>
  </div>

  <!-- Resultados -->
  <div id="resultados">
    <div class="card card-dark" style="margin-bottom:16px">
      <div class="card-title">Resultado</div>
      <div class="metrics" id="metrics-top"></div>
      <div class="metrics" style="margin-top:10px" id="metrics-bottom"></div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-title">Desglose del scrap</div>
      <div id="desglose"></div>
    </div>

    <div class="formula" id="formula"></div>
  </div>

</div>

<script>
function getScrapPct(qty) {
  if (qty >= 1000 && qty <= 5000) return 5;
  if (qty > 5000 && qty <= 10000) return 25;
  if (qty > 10000 && qty <= 100000) return 12;
  if (qty > 100000 && qty <= 500000) return 3;
  if (qty > 500000 && qty <= 1000000) return 1;
  return 1;
}

function calcularMetrosSustrato({ qty, ancho_etiq, gap_avance, filas, setup, pie, bob_sust, metros_folia, bob_folia }) {
  const pct = getScrapPct(qty);
  const etiqExtra = Math.ceil(qty * pct / 100);
  const totalEtiq = qty + etiqExtra;

  const pitch = (ancho_etiq + gap_avance) / 1000;
  const etiqPorFila = Math.ceil(totalEtiq / filas);
  const mBrutos = etiqPorFila * pitch;

  const nCambSust = Math.floor(mBrutos / bob_sust);
  const scrapSust = nCambSust * 50;

  let scrapFolia = 0;
  if (metros_folia > 0 && bob_folia > 0) {
    scrapFolia = Math.floor(metros_folia / bob_folia) * 50;
  }

  const mTotal = Math.round(mBrutos + setup + pie + scrapSust + scrapFolia);
  const bobNec = Math.ceil(mTotal / bob_sust);

  return { mTotal, bobNec, mBrutos: Math.round(mBrutos), scrapSust, scrapFolia, etiqExtra, pct };
}

function v(id) { return parseFloat(document.getElementById(id).value) || 0; }
function vi(id) { return parseInt(document.getElementById(id).value) || 0; }
function n(val, d = 2) { return val !== undefined ? Number(val).toFixed(d) : '-'; }

function recalcular() {
  const qty          = vi('qty');
  const ancho_etiq   = v('ancho_etiq');
  const alto_etiq    = v('alto_etiq');
  const gap_avance   = v('gap_avance');
  const gap_alto     = v('gap_alto');
  const gap_extremos = v('gap_extremos');
  const filas        = vi('filas') || 1;
  const setup        = v('setup');
  const pie          = v('pie');
  const bob_sust     = v('bob_sust') || 1;
  const metros_folia = v('metros_folia');
  const bob_folia    = v('bob_folia');

  const anchoSustrato = alto_etiq
    ? (filas * alto_etiq) + ((filas - 1) * gap_alto) + (2 * gap_extremos)
    : null;

  if (!qty || !ancho_etiq) {
    document.getElementById('resultados').classList.remove('visible');
    return;
  }

  const r = calcularMetrosSustrato({ qty, ancho_etiq, gap_avance, filas, setup, pie, bob_sust, metros_folia, bob_folia });

  const pitch = (ancho_etiq + gap_avance) / 1000;
  const etiqPorFila = Math.ceil((qty + r.etiqExtra) / filas);
  const scrapArranque = setup + pie;

  const anchoHtml = anchoSustrato !== null
    ? `<div class="metric"><div class="metric-label">Ancho sustrato</div><div class="metric-value">${Math.round(anchoSustrato)}</div><div class="metric-unit">mm</div></div>`
    : '';

  document.getElementById('metrics-top').innerHTML = `
    <div class="metric accent"><div class="metric-label">Total metros lineales</div><div class="metric-value">${r.mTotal.toLocaleString('es-AR')}</div><div class="metric-unit">metros</div></div>
    <div class="metric"><div class="metric-label">Bobinas necesarias</div><div class="metric-value">${r.bobNec}</div><div class="metric-unit">de ${bob_sust} m c/u</div></div>
    ${anchoHtml}
  `;

  document.getElementById('metrics-bottom').innerHTML = `
    <div class="metric"><div class="metric-label">Metros brutos</div><div class="metric-value">${r.mBrutos.toLocaleString('es-AR')}</div><div class="metric-unit">metros</div></div>
    <div class="metric"><div class="metric-label">Etiquetas extra</div><div class="metric-value">${r.etiqExtra.toLocaleString('es-AR')}</div><div class="metric-unit">${r.pct}% por rango</div></div>
    <div class="metric"><div class="metric-label">Pitch</div><div class="metric-value">${n(pitch * 1000, 1)}</div><div class="metric-unit">mm</div></div>
    <div class="metric"><div class="metric-label">Etiq. por fila</div><div class="metric-value">${etiqPorFila.toLocaleString('es-AR')}</div><div class="metric-unit">TECHO(total/${filas} filas)</div></div>
  `;

  const foliaHtml = (metros_folia > 0 && bob_folia > 0)
    ? `<div class="desglose-fila"><span class="lbl">Scrap cambio folia</span><span class="val">${r.scrapFolia} m</span></div>`
    : '';

  document.getElementById('desglose').innerHTML = `
    <div class="desglose-fila"><span class="lbl">Etiquetas solicitadas</span><span class="val">${qty.toLocaleString('es-AR')}</span></div>
    <div class="desglose-fila"><span class="lbl">Etiquetas extra (${r.pct}%)</span><span class="val">${r.etiqExtra.toLocaleString('es-AR')}</span></div>
    <div class="desglose-fila"><span class="lbl">Total etiquetas a producir</span><span class="val">${(qty + r.etiqExtra).toLocaleString('es-AR')}</span></div>
    <div class="desglose-fila"><span class="lbl">Setup + pie</span><span class="val">${n(scrapArranque)} m</span></div>
    <div class="desglose-fila"><span class="lbl">Scrap cambio sustrato (${Math.floor(r.mBrutos / bob_sust)} cambios × 50 m)</span><span class="val">${r.scrapSust} m</span></div>
    ${foliaHtml}
    <div class="desglose-fila negrita"><span class="lbl">Total metros</span><span class="val">${r.mTotal.toLocaleString('es-AR')} m</span></div>
  `;

  const anchoFormulaHtml = anchoSustrato !== null
    ? `ancho_sustrato = (${filas} × ${alto_etiq}) + (${filas - 1} × ${gap_alto}) + (2 × ${gap_extremos}) = ${Math.round(anchoSustrato)} mm<br>`
    : '';

  document.getElementById('formula').innerHTML = `
    <span class="formula-titulo">Fórmula aplicada</span>
    ${anchoFormulaHtml}etiq_extra = TECHO(${qty} × ${r.pct}%) = ${r.etiqExtra}<br>
    total_etiq = ${qty} + ${r.etiqExtra} = ${qty + r.etiqExtra}<br>
    pitch = (${ancho_etiq} + ${gap_avance}) / 1000 = ${n(pitch, 4)} m<br>
    etiq_por_fila = TECHO(${qty + r.etiqExtra} / ${filas}) = ${etiqPorFila}<br>
    m_brutos = ${etiqPorFila} × ${n(pitch, 4)} = ${r.mBrutos} m<br>
    scrap_sust = PISO(${r.mBrutos} / ${bob_sust}) × 50 = ${r.scrapSust} m<br>
    <strong style="color:#2a1a00">m_total = ${r.mBrutos} + ${n(setup)} + ${n(pie)} + ${r.scrapSust} + ${r.scrapFolia} = ${r.mTotal} m</strong>
  `;

  document.getElementById('resultados').classList.add('visible');
}

async function init() {
  const res = await fetch('/api/me');
  if (!res.ok) { window.location.href = '/login'; return; }
  const me = await res.json();
  const ROLES = { ADMIN:'Administrador', COMERCIAL:'Comercial', PRODUCCION:'Producción', DEPOSITO:'Depósito', COMPRAS:'Compras', PREPRENSA:'Preprensa' };
  document.getElementById('user-label').textContent = `${me.nombre} · ${ROLES[me.rol]||me.rol}`;
}

init();
</script>
</body>
</html>
